services:
  db:
    image: postgres:16
    container_name: bikelog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bikelog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bikelog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bikelog"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  bikelog_postgres_data:
