name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bikelog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bikelog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bikelog_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bikelog_test?schema=public
      AUTH_SECRET: ci-test-auth-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync schema
        run: npm run db:push

      - name: Run integration tests
        run: |
          TEST_FILES="$(find tests/integration -type f -name '*.test.ts' -print)"
          if [ -z "$TEST_FILES" ]; then
            echo "No integration tests found."
            exit 1
          fi
          node --import tsx --test $TEST_FILES
